<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Evergreen Medica</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: Optima, Georgia, serif; background: #f2f0eb; min-height: 100vh; }

/* LANDING */
#landing {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2.5rem 1.5rem;
  gap: 0;
  background: #304748;
}
.landing-logo {
  width: min(320px, 85vw);
  height: auto;
  margin-bottom: 2.5rem;
}
.landing-label {
  font-size: 11px;
  letter-spacing: 0.14em;
  color: rgba(201,169,110,0.55);
  text-transform: uppercase;
  margin-bottom: 1.2rem;
  text-align: center;
}
.name-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 320px;
}
.name-btn {
  background: rgba(255,255,255,0.07);
  color: #C9A96E;
  border: 0.5px solid rgba(201,169,110,0.25);
  border: none;
  border-radius: 10px;
  padding: 16px 24px;
  font-family: Optima, Georgia, serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.15s;
}
.name-btn:active { background: rgba(255,255,255,0.13); }
.name-btn .title-sub {
  font-size: 10px;
  font-weight: 400;
  color: rgba(201,169,110,0.6);
  letter-spacing: 0.06em;
  text-align: right;
  line-height: 1.4;
  max-width: 140px;
}
.name-btn .arrow { font-size: 18px; color: rgba(201,169,110,0.5); margin-left: 8px; }

/* CARD PAGE */
#card-page {
  display: none;
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  background: #f2f0eb;
  padding-bottom: 2rem;
}
.back-btn {
  align-self: flex-start;
  background: none;
  border: none;
  font-family: Optima, Georgia, serif;
  font-size: 13px;
  color: #304748;
  padding: 1.2rem 1.2rem 0.5rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 0.04em;
}
.back-btn:active { opacity: 0.6; }

.vcard {
  width: min(360px, 92vw);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(48,71,72,0.13);
  background: #fff;
  margin-top: 0.5rem;
}
.vcard-top {
  background: #304748;
  padding: 2rem 1.5rem 1.6rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.vcard-logo {
  width: 220px;
  height: auto;
  margin-bottom: 1.4rem;
}
.vcard-divider {
  width: 56px; height: 0.5px;
  background: rgba(201,169,110,0.4);
  margin-bottom: 10px;
}
.vcard-name {
  color: #C9A96E;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-align: center;
}
.vcard-jobtitle {
  color: rgba(201,169,110,0.65);
  font-size: 11px;
  letter-spacing: 0.07em;
  text-align: center;
  margin-top: 5px;
}
.vcard-bottom {
  padding: 1.6rem 1.5rem 1.4rem;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.vcard-row {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  color: #2c2c2c;
}
.vcard-row svg {
  width: 18px; height: 18px;
  stroke: #304748; fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}
.vcard-row a { color: #2c2c2c; text-decoration: none; }
.vcard-qr-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 6px;
  padding-top: 14px;
  border-top: 0.5px solid #e8e5df;
}
.vcard-qr-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: #304748;
  opacity: 0.45;
  font-weight: 700;
}
.vcard-qr-sub {
  font-size: 10px;
  color: #999;
  letter-spacing: 0.02em;
  margin-top: 3px;
}
.save-btn {
  display: block;
  width: min(360px, 92vw);
  margin-top: 16px;
  padding: 14px;
  background: #304748;
  color: #C9A96E;
  font-family: Optima, Georgia, serif;
  font-size: 13px;
  letter-spacing: 0.07em;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  text-align: center;
}
.save-btn:active { background: #1e2f30; }

@media print {
  #landing { display: none !important; }
  #card-page { display: flex !important; min-height: auto; background: white; padding: 0; }
  .back-btn, .save-btn { display: none; }
  .vcard { box-shadow: none; width: 100%; border-radius: 0; }
}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
var people = {
  rob:    { name: 'Rob Bruun',    title: 'Chief Executive Officer',   email: 'rob@egmedica.com',    phone: '+66 81 010 9277' },
  damian: { name: 'Damian',       title: 'Chief Cultivation Officer', email: 'damian@egmedica.com', phone: '+66 61 396 4001' },
  mariah: { name: 'Mariah Munro', title: 'Chief Operations Officer',  email: 'mariah@egmedica.com', phone: '+1 (778) 893 9471' }
};

var qrGenerated = false;

function showCard(id) {
  var p = people[id];
  document.getElementById('vc-name').textContent = p.name;
  document.getElementById('vc-title').textContent = p.title;
  var emailEl = document.getElementById('vc-email');
  emailEl.textContent = p.email;
  emailEl.href = 'mailto:' + p.email;
  document.getElementById('vc-phone').textContent = p.phone;

  if (!qrGenerated && window.QRCode) {
    var tmp = document.createElement('div');
    new QRCode(tmp, { text: 'https://egmedica.com', width: 80, height: 80, colorDark: '#304748', colorLight: 'rgba(0,0,0,0)', correctLevel: QRCode.CorrectLevel.M });
    function draw(t) {
      var el = tmp.querySelector('canvas') || tmp.querySelector('img');
      if (!el && t < 20) { setTimeout(function(){ draw(t+1); }, 80); return; }
      if (!el) return;
      var canvas = document.getElementById('vc-qr');
      var ctx = canvas.getContext('2d');
      if (el.tagName === 'CANVAS') ctx.drawImage(el, 0, 0, 80, 80);
      else { var i = new Image(); i.onload = function(){ ctx.drawImage(i, 0, 0, 80, 80); }; i.src = el.src; }
    }
    draw(0);
    qrGenerated = true;
  }

  document.getElementById('landing').style.display = 'none';
  document.getElementById('card-page').style.display = 'flex';
  window.scrollTo(0, 0);
}

function showLanding() {
  document.getElementById('card-page').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
  window.scrollTo(0, 0);
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function saveCard() {
  var btn = document.getElementById('save-btn');
  var backBtn = document.querySelector('.back-btn');
  btn.textContent = 'Saving...';
  btn.style.opacity = '0.7';
  backBtn.style.visibility = 'hidden';

  var card = document.querySelector('.vcard');
  html2canvas(card, {
    scale: 3,
    useCORS: true,
    allowTaint: true,
    backgroundColor: '#ffffff',
    logging: false
  }).then(function(canvas) {
    backBtn.style.visibility = '';
    btn.textContent = 'Save card';
    btn.style.opacity = '1';

    var name = document.getElementById('vc-name').textContent.split(' ')[0].toLowerCase();
    var filename = 'egmedica-' + name + '-card.png';

    canvas.toBlob(function(blob) {
      var file = new File([blob], filename, { type: 'image/png' });
      // Use Web Share API on iOS — opens native share sheet with Save Image option
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file] }).catch(function(){});
      } else {
        // Fallback for desktop / Android
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
      }
    }, 'image/png');
  }).catch(function() {
    backBtn.style.visibility = '';
    btn.textContent = 'Save card';
    btn.style.opacity = '1';
  });
}
</script>
